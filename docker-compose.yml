services:
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8081:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
    restart: always
    environment:
      - JENKINS_OPTS=--httpPort=8080

  crave-app:
    build: .
    ports:
      - "3000:80"
    restart: always

volumes:
  jenkins_data:
